name: CI/CD Security & Test Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Limit GITHUB_TOKEN permissions to read-only for security
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # v4.1.7

    - name: Set up Python
      uses: actions/setup-python@v5 # v5.1.1
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev]

    - name: Run Ruff Linter & Formatter
      run: ruff check myutils/

    - name: Run Bandit Security Audit
      run: bandit -r myutils/

    - name: Audit Dependencies with pip-audit
      uses: pypa/gh-action-pip-audit@v1.1.0
      with:
        inputs: pyproject.toml

    - name: Run Tests with pytest
      run: pytest tests/
